<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
  body { background: #0a0c18; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; flex-direction: column; gap: 3rem; }
  .preview-dark { background: #0a0c18; padding: 2rem 3rem; border-radius: 12px; }
  .preview-light { background: #ffffff; padding: 2rem 3rem; border-radius: 12px; }
  p { color: rgba(255,255,255,.4); font-family: sans-serif; font-size:.8rem; text-align:center; margin-top:.5rem; }
</style>
</head>
<body>
  <div class="preview-dark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 36" fill="none" height="48">
      <line x1="8" y1="8"  x2="20" y2="28" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.7"/>
      <line x1="8" y1="8"  x2="26" y2="14" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.7"/>
      <line x1="20" y1="28" x2="26" y2="14" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.5"/>
      <circle cx="8"  cy="8"  r="3"   fill="#00c2b5"/>
      <circle cx="26" cy="14" r="3.5" fill="#00c2b5"/>
      <circle cx="20" cy="28" r="2.5" fill="#00c2b5" fill-opacity="0.75"/>
      <text x="38" y="26" font-family="Poppins, sans-serif" font-weight="700" font-size="22" fill="#ffffff">Lex</text>
      <text x="79" y="26" font-family="Poppins, sans-serif" font-weight="700" font-size="22" fill="#00c2b5">Ai</text>
    </svg>
    <p>on dark</p>
  </div>
  <div class="preview-light">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 36" fill="none" height="48">
      <line x1="8" y1="8"  x2="20" y2="28" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.7"/>
      <line x1="8" y1="8"  x2="26" y2="14" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.7"/>
      <line x1="20" y1="28" x2="26" y2="14" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.5"/>
      <circle cx="8"  cy="8"  r="3"   fill="#00c2b5"/>
      <circle cx="26" cy="14" r="3.5" fill="#00c2b5"/>
      <circle cx="20" cy="28" r="2.5" fill="#00c2b5" fill-opacity="0.75"/>
      <text x="38" y="26" font-family="Poppins, sans-serif" font-weight="700" font-size="22" fill="#0b0d19">Lex</text>
      <text x="79" y="26" font-family="Poppins, sans-serif" font-weight="700" font-size="22" fill="#00c2b5">Ai</text>
    </svg>
    <p style="color:#999">on light</p>
  </div>
</body>
</html>
